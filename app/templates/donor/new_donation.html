{% extends "base.html" %}
{% block title %}New Donation — FoodBridge{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Submit a New Donation</h2>
  <a href="{{ url_for('donor.dashboard') }}" class="btn btn-outline">← Back</a>
</div>

<div class="card" style="max-width: 580px;">
  <div class="card-header">Food Donation Details</div>

  <form method="POST" action="{{ url_for('donor.new_donation') }}">

    <div class="form-group">
      <label for="food_name">Food Item Name</label>
      <input
        type="text"
        id="food_name"
        name="food_name"
        class="form-control"
        placeholder="e.g. Jollof Rice, Fried Chicken, Bread"
        required
        autofocus
      />
    </div>

    <div class="form-group">
      <label for="quantity">Quantity / Estimated Portions</label>
      <input
        type="text"
        id="quantity"
        name="quantity"
        class="form-control"
        placeholder="e.g. 50 plates, 20 loaves, 10 trays"
        required
      />
    </div>

    <div class="form-group">
      <label for="location">Pickup Location / Address</label>
      <input
        type="text"
        id="location"
        name="location"
        class="form-control"
        placeholder="e.g. 14 Adeola Odeku St, Victoria Island"
        required
      />
    </div>

    <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
      <button type="submit" class="btn btn-primary">Submit Donation</button>
      <a href="{{ url_for('donor.dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
